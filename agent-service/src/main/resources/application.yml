server:
  port: 7010

spring:
  application:
    name: agent-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        group: SLING_GROUP
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3307/sl?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: root123
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    publisher-confirm-type: correlated
    publisher-returns: true
  data:
    mongodb:
      uri: mongodb://root:root@localhost:27017/sling?authSource=admin
  redis:
    host: localhost
    port: 6379
    database: 0

# Feign + Sentinel
feign:
  sentinel:
    enabled: true
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 10000

logging:
  level:
    com.sling.agent: debug
    org.springframework.amqp: info
  pattern:
    dateformat: yyyy-MM-dd HH:mm:ss.SSS
