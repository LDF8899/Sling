server:
  port: 7003

spring:
  application:
    name: recognition-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        group: SLING_GROUP
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    url: jdbc:mysql://127.0.0.1:3307/sl?useSSL=false&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&allowMultiQueries=true
    username: root
    password: root123

# 火山引擎 API 配置（通过环境变量覆盖）
api:
  volcano:
    key: ${ARK_API_KEY:ark-47c20815-3186-4c9e-955e-937229ccda13-5a2a5}
    model-id: doubao-seed-2-0-pro-260215
    base-url: https://ark.cn-beijing.volces.com/api/v3/chat/completions

# 日志配置
logging:
  level:
    com.sling.recognition: debug
  pattern:
    dateformat: yyyy-MM-dd HH:mm:ss.SSS