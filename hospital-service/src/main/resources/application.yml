server:
  port: 8089

spring:
  application:
    name: hospital-service

  cloud:
    nacos:
      server-addr: localhost:8848
      discovery:
        group: SLING_GROUP

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3307/sl?useSSL=false&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&allowMultiQueries=true&characterSetResults=utf8&connectionCollation=utf8_general_ci
    username: root
    password: root123
    type: com.alibaba.druid.pool.DruidDataSource
    initial-size: 5
    min-idle: 5
    max-active: 20
    max-wait: 60000
    time-between-eviction-runs-millis: 60000
    min-evictable-idle-time-millis: 300000
    validation-query: SELECT 1
    test-while-idle: true
    test-on-borrow: false
    test-on-return: false

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumOrdinalTypeHandler
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

# 高德地图API配置（通过环境变量覆盖）
amap:
  api-key: ${GAODE_API_KEY:your-gaode-key-here}


# 分页配置
pagehelper:
  reasonable: true
  support-methods-arguments: true
  params: count=countSql

# Python脚本配置
app:
  python:
    hospital-dir: C:/Users/Asuka/Desktop/1/Sling/py/hospital-service-py
    executable: ${PYTHON_EXECUTABLE:python}

# AI服务配置（已移除AI相关配置，专注于Python脚本）
hospital:
  search:
    default-radius: 5000
    max-results: 10